version: "3.8"
services:
  backup-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/zhyino/bnetdisk:latest
    container_name: backup-web
    ports:
      - "18008:18008"
    volumes:
      - ./data:/app/data:rw
      # 源目录（真实视频，可来自网盘挂载，建议只读）
      # - /path/to/cloud/media:/Nas:ro
      # 目标目录（假文件输出，请用本地硬盘，需要可写）
      # - /path/to/local/placeholders:/115:rw
    environment:
      - BACKUP_DIR=/app/data
      # 源目录扫描速度（文件/秒）。用于避免网盘被频繁读取触发封控；0=不限速
      - BACKUP_RATE=20
      - APP_PORT=18008
      # 可选：限制可访问根路径（逗号分隔）。设置后更安全
      # - ALLOWED_ROOTS=/Nas,/115,/app/data
      # 可选：将 /app/data 属主改为宿主用户（容器以 root 启动时有效）
      # - UID=1000
      # - GID=1001
    restart: unless-stopped
    # 若需要固定用户运行，可取消注释：
    # user: "1000:1001"
